name: GitHub Metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # Update every 12 hours (less API load, still fresh)
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}

          # Sections shown
          base: header, activity, community, repositories, metadata

          # Include private repo contribution data
          repositories_affiliations: owner, collaborator

          # Best theme (balanced + modern + dark)
          config_theme: dracula

          # Timezone for contribution dates
          config_timezone: Asia/Kolkata

          # Add useful additional cards
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_limit: 8

          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes

          plugin_lines: yes
          plugin_lines_history_limit: 1

          # Smooth and minimal look
          config_twemoji: yes

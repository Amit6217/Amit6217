name: Generate Snake (GitHub Pages)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animations (light & dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Amit6217
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=30a14e&color_dots=9be9a8,40c463,30a14e,216e39,216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=9be9a8&color_dots=216e39,30a14e,40c463,9be9a8,9be9a8

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

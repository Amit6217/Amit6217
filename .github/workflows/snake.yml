name: Generate Snake (GitHub-themed, Pages)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake (light & dark)
        uses: Platane/snk@v3
        with:
          github_user_name: Amit6217
          # produce two files: light & dark. Use GitHub palette and GitHub-green snake/dots.
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=30a14e&color_dots=9be9a8,40c463,30a14e,216e39,216e39
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=9be9a8&color_dots=216e39,216e39,30a14e,40c463,9be9a8

      - name: Show generated files (debug)
        run: ls -la dist || true

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # publish_branch default is gh-pages; no need to configure the Pages site manually.
